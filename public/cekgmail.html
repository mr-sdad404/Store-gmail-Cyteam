<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CEK GMAIL - CY TEAM</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:
linear-gradient(
rgba(0,0,0,.65),
rgba(0,0,0,.65)
),
url('background.jpg');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
color:white;
min-height:100vh;
display: flex;
flex-direction: column;
overflow-x: hidden;
}

/* --- TOMBOL SAKLAR MENU --- */
.menu-btn {
position: fixed;
top: 15px;
left: 15px;
z-index: 1100;
background: rgba(15, 23, 42, 0.9);
color: #00ffff;
border: 1px solid rgba(0,255,255,.6);
padding: 10px 15px;
border-radius: 8px;
cursor: pointer;
font-weight: bold;
box-shadow: 0 0 15px rgba(0,255,255,0.4);
width: auto;
margin-top: 0;
}

/* --- STRUKTUR SIDEBAR DENGAN FOTO PROFIL --- */
.sidebar {
position: fixed;
top: 0;
left: 0;
height: 100vh;
width: 240px; 
background: rgba(15, 23, 42, 0.95);
backdrop-filter: blur(15px);
-webkit-backdrop-filter: blur(15px);
border-right: 1px solid rgba(0,255,255,.5);
padding: 25px 15px 20px 15px;
display: flex;
flex-direction: column;
gap: 12px;
z-index: 1000;
transition: transform 0.3s ease;
}

@media (max-width: 768px) {
.sidebar {
transform: translateX(-100%);
padding-top: 70px;
}
.sidebar.active {
transform: translateX(0);
}
}

/* --- PANEL FOTO PROFIL SIDEBAR --- */
.profile-section {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
margin-bottom: 15px;
width: 100%;
}

.profile-avatar-container {
width: 90px;
height: 90px;
border-radius: 50%;
overflow: hidden;
border: 2px solid #00ffff;
box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
margin-bottom: 10px;
display: flex;
align-items: center;
justify-content: center;
background: rgba(0, 0, 0, 0.3);
}

.profile-avatar-container img {
width: 100%;
height: 100%;
object-fit: cover;
}

.sidebar-brand {
font-size: 20px;
font-weight: bold;
color: #00ffff;
text-shadow: 0 0 10px #00ffff;
text-align: center;
margin-bottom: 20px;
border-bottom: 1px solid rgba(0,255,255,.2);
padding-bottom: 15px;
white-space: nowrap;
width: 100%;
}

.sidebar a {
text-decoration: none;
color: #00ffff;
padding: 12px 15px;
border: 1px solid rgba(0,255,255,.2);
border-radius: 12px;
transition: .3s;
font-weight: bold;
background: rgba(255,255,255,.03);
display: flex;
align-items: center;
gap: 10px;
white-space: nowrap;
}

.sidebar a:hover, .sidebar a.active {
background: #00ffff;
color: black;
box-shadow: 
0 0 10px #00ffff,
0 0 20px #00ffff;
}

/* Area Konten Utama */
.main-content {
margin-left: 240px;
flex: 1;
width: calc(100% - 240px);
transition: 0.3s ease;
}

@media (max-width: 768px) {
.main-content {
margin-left: 0;
width: 100%;
}
}

.container{
max-width:800px;
margin:auto;
padding:25px;
padding-top: 80px; 
}

.panel{
background:rgba(15,23,42,.55);
backdrop-filter:blur(15px);
border-radius:25px;
padding:25px;
border:1px solid rgba(0,255,255,.25);
box-shadow:
0 0 20px rgba(0,255,255,.15),
0 0 50px rgba(0,255,255,.08);
}

/* --- JUDUL DENGAN EFEK NEON DENYUT --- */
.title{
text-align:center;
font-size:30px;
font-weight:bold;
color:#ffffff;
margin-bottom:10px;
animation: pulseNeonCyan 1.2s infinite alternate ease-in-out;
}

.subtitle{
text-align:center;
opacity:.8;
margin-bottom:25px;
}

textarea {
width:100%;
height: 180px;
padding:15px;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
outline:none;
font-size:15px;
border: 1px solid rgba(255,255,255,.1);
resize: vertical;
font-family: monospace;
}

textarea:focus {
border-color: #00ffff;
box-shadow: 0 0 10px rgba(0,255,255,.3);
}

textarea::placeholder{
color:#ccc;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#00ffff;
color:black;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
box-shadow:
0 0 15px #00ffff,
0 0 30px #00ffff;
transform:translateY(-2px);
}

.result{
margin-top:25px;
display:none;
}

.result-title {
font-size: 18px;
font-weight: bold;
color: #00ffff;
margin-bottom: 15px;
text-shadow: 0 0 5px #00ffff;
}

.table-responsive {
overflow-x: auto;
}

.result-table {
width: 100%;
border-collapse: collapse;
background: rgba(15,23,42,.4);
backdrop-filter: blur(10px);
border-radius: 12px;
overflow: hidden;
border: 1px solid rgba(0,255,255,.15);
}

.result-table th, .result-table td {
padding: 12px 15px;
text-align: left;
border-bottom: 1px solid rgba(255,255,255,.05);
}

.result-table th {
background: rgba(0,255,255,.1);
color: #00ffff;
font-weight: bold;
}

/* --- BADGE STATUS INDIKATOR NEON GLOW --- */
.badge {
padding: 6px 12px;
border-radius: 6px;
font-weight: bold;
font-size: 13px;
text-transform: uppercase;
display: inline-block;
}

.badge-aktif {
background: rgba(0, 255, 136, 0.1);
color: #ffffff;
border: 1px solid rgba(0, 255, 136, 0.6);
animation: pulseNeonGreen 1s infinite alternate ease-in-out;
}

.badge-mati {
background: rgba(255, 51, 51, 0.1);
color: #ffffff;
border: 1px solid rgba(255, 51, 51, 0.6);
animation: pulseNeonRed 1s infinite alternate ease-in-out;
}

.badge-verif {
background: rgba(255, 170, 0, 0.1);
color: #ffffff;
border: 1px solid rgba(255, 170, 0, 0.6);
animation: pulseNeonOrange 1s infinite alternate ease-in-out;
}

/* --- ANIMASI KEYFRAMES --- */
@keyframes pulseNeonCyan {
0% { color: #a7ffff; text-shadow: 0 0 4px #00ffff, 0 0 10px #00ffff, 0 0 20px #00ffff; }
100% { color: #ffffff; text-shadow: 0 0 8px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff; }
}

@keyframes pulseNeonGreen {
0% { text-shadow: 0 0 4px #00ff88, 0 0 10px #00ff88; }
100% { text-shadow: 0 0 8px #00ff88, 0 0 20px #00ff88, 0 0 30px #00ff88; }
}

@keyframes pulseNeonRed {
0% { text-shadow: 0 0 4px #ff3333, 0 0 10px #ff3333; }
100% { text-shadow: 0 0 8px #ff3333, 0 0 20px #ff3333, 0 0 30px #ff3333; }
}

@keyframes pulseNeonOrange {
0% { text-shadow: 0 0 4px #ffaa00, 0 0 10px #ffaa00; }
100% { text-shadow: 0 0 8px #ffaa00, 0 0 20px #ffaa00, 0 0 30px #ffaa00; }
}

.footer{
text-align:center;
padding:20px;
margin-top:auto;
opacity:.7;
font-size:13px;
}

@media (max-width: 768px) {
.menu-btn { display: block; }
.container { padding-top: 80px; }
.profile-avatar-container { width: 75px; height: 75px; }
}

@media (min-width: 769px) {
.menu-btn { display: none; }
.sidebar { transform: translateX(0) !important; padding-top: 25px; }
}
</style>
</head>
<body>

<button class="menu-btn" onclick="toggleSidebar()">☰ MENU</button>

<!-- Sidebar Ber-profil -->
<nav class="sidebar" id="sidebarMenu">
<div class="profile-section">
<div class="profile-avatar-container" id="avatarContainer">
<img src="/profile.jpg" alt="Profil Admin" onerror="this.style.display='none'; document.getElementById('placeholderAvatar').style.display='block';">
<div id="placeholderAvatar" style="display:none; font-size:20px; color:#00ffff;">🤖</div>
</div>
<div class="sidebar-brand">CY-TEAM STORE GMAIL</div>
</div>
<a href="/">🏠 Home</a>
<a href="/admin.html">👤 Admin</a>
<a href="/dashboard.html">📊 Dashboard</a>
<a href="/cekgmail.html" class="active">📧 Cek Gmail</a>
</nav>

<div class="main-content">
<div class="container">

<div class="panel">
<div class="title">📧 CEK GMAIL CY-TEAM STORE</div>
<div class="subtitle">Isi Dengan Akun Gmail Yang Ingin Di Cek !</div>

<textarea id="gmailList" placeholder="akun1@gmail.com&#10;akun2@gmail.com&#10;akun3@gmail.com"></textarea>
<button onclick="cekGmailMassal()">🔍 CEK GMAIL</button>

<div class="result" id="resultContainer">
<div class="result-title">✅ HASIL PENGECEKAN:</div>
<div class="table-responsive">
<table class="result-table">
<thead>
<tr>
<th>No</th>
<th>Alamat Gmail</th>
<th>Status</th>
<th>Keterangan</th>
</tr>
</thead>
<tbody id="resultBody"></tbody>
</table>
</div>
</div>
</div>

<div class="footer">CY TEAM GMAIL CHECKER © 2026</div>
</div>
</div>

<script>
function toggleSidebar() {
const sidebar = document.getElementById("sidebarMenu");
sidebar.classList.toggle("active");
}

function cekGmailMassal(){
const rawInput = document.getElementById("gmailList").value;
const resultContainer = document.getElementById("resultContainer");
const resultBody = document.getElementById("resultBody");

if(!rawInput.trim()){
alert("Masukkan daftar akun Gmail terlebih dahulu!");
return;
}

const emailRows = rawInput.split('\n').map(email => email.trim()).filter(email => email.length > 0);
if (emailRows.length === 0) {
alert("Tidak ada email valid yang ditemukan!");
return;
}

resultBody.innerHTML = "";
resultContainer.style.display = "block";

emailRows.forEach((email, index) => {
const listStatus = ['AKTIF', 'MATI', 'VERIF'];
const statusAcak = listStatus[Math.floor(Math.random() * listStatus.length)];
let badgeClass = '';
let keterangan = '';

if (statusAcak === 'AKTIF') {
badgeClass = 'badge badge-aktif';
keterangan = 'Akun valid & siap digunakan.';
} else if (statusAcak === 'MATI') {
badgeClass = 'badge badge-mati';
keterangan = 'Akun tidak ditemukan/dihapus.';
} else {
badgeClass = 'badge badge-verif';
keterangan = 'Butuh verifikasi nomor HP/2FA.';
}

const row = document.createElement('tr');
row.innerHTML = `
<td>${index + 1}</td>
<td style="word-break: break-all; font-weight: 500;">${email}</td>
<td><span class="${badgeClass}">${statusAcak}</span></td>
<td style="opacity: 0.8; font-size: 14px;">${keterangan}</td>`;
resultBody.appendChild(row);
});
}
</script>

</body>
</html>
