<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=https://www.gmailchecklive.com/">

<title>CEK GMAIL - CY TEAM</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

background:
linear-gradient(
rgba(0,0,0,.65),
rgba(0,0,0,.65)
),
url('background.jpg');

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

color:white;
min-height:100vh;

}

.navbar{

display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;

padding:15px;

background:rgba(0,0,0,.3);
backdrop-filter:blur(12px);

border-bottom:1px solid rgba(0,255,255,.3);

}

.navbar a{

text-decoration:none;
color:#00ffff;

padding:10px 18px;

border-radius:12px;

border:1px solid rgba(0,255,255,.3);

background:rgba(255,255,255,.05);

font-weight:bold;

transition:.3s;

}

.navbar a:hover{

background:#00ffff;
color:black;

box-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff;

}

.container{

max-width:700px;

margin:auto;

padding:25px;

}

.panel{

margin-top:40px;

background:rgba(15,23,42,.55);

backdrop-filter:blur(15px);

border-radius:25px;

padding:25px;

border:1px solid rgba(0,255,255,.25);

box-shadow:
0 0 20px rgba(0,255,255,.15),
0 0 50px rgba(0,255,255,.08);

}

.title{

text-align:center;

font-size:30px;

font-weight:bold;

color:#00ffff;

text-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff;

margin-bottom:10px;

}

.subtitle{

text-align:center;

opacity:.8;

margin-bottom:25px;

}

input{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:rgba(255,255,255,.08);

color:white;

outline:none;

font-size:15px;

}

input::placeholder{

color:#ccc;

}

button{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:12px;

background:#00ffff;

color:black;

font-weight:bold;

font-size:16px;

cursor:pointer;

transition:.3s;

}

button:hover{

box-shadow:
0 0 15px #00ffff,
0 0 30px #00ffff;

transform:translateY(-2px);

}

.result{

margin-top:20px;

display:none;

}

.card{

background:rgba(255,255,255,.06);

padding:15px;

border-radius:15px;

border:1px solid rgba(0,255,255,.15);

}

.status{

font-size:20px;
font-weight:bold;
color:#00ffff;

margin-bottom:10px;

}

.footer{

text-align:center;

padding:20px;

margin-top:30px;

opacity:.7;

font-size:13px;

}

</style>
</head>
<body>

<nav class="navbar">
<a href="/">🏠 Home</a>
<a href="/cekgmail.html">📧 Cek Gmail</a>
<a href="/admin.html">👤 Admin</a>
</nav>

<div class="container">

<div class="panel">

<div class="title">
📧 CEK GMAIL
</div>

<div class="subtitle">
Masukkan Gmail yang ingin dicek
</div>

<input
type="email"
id="gmail"
placeholder="Masukkan Gmail">

<button onclick="cekGmail()">
🔍 CEK GMAIL
</button>

<div class="result" id="result">

<div class="card">

<div class="status">
✅ Gmail Ditemukan
</div>

<div id="info"></div>

</div>

</div>

</div>

</div>

<div class="footer">
CY TEAM GMAIL CHECKER © 2026
</div>

<script>

function cekGmail(){

const gmail =
document.getElementById("gmail").value;

if(!gmail){

alert("Masukkan Gmail terlebih dahulu");

return;

}

document.getElementById("result").style.display =
"block";

document.getElementById("info").innerHTML = `
<b>Email:</b> ${gmail}<br><br>
Status: Sedang diproses...
`;

}

</script>

</body>
</html>
