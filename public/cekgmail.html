<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CEK GMAIL - CY TEAM</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:
linear-gradient(
rgba(0,0,0,.65),
rgba(0,0,0,.65)
),
url('background.jpg');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
color:white;
min-height:100vh;
}

.navbar{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
padding:15px;
background:rgba(0,0,0,.3);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(0,255,255,.3);
}

.navbar a{
text-decoration:none;
color:#00ffff;
padding:10px 18px;
border-radius:12px;
border:1px solid rgba(0,255,255,.3);
background:rgba(255,255,255,.05);
font-weight:bold;
transition:.3s;
}

.navbar a:hover{
background:#00ffff;
color:black;
box-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff;
}

.container{
max-width:800px;
margin:auto;
padding:25px;
}

.panel{
margin-top:40px;
background:rgba(15,23,42,.55);
backdrop-filter:blur(15px);
border-radius:25px;
padding:25px;
border:1px solid rgba(0,255,255,.25);
box-shadow:
0 0 20px rgba(0,255,255,.15),
0 0 50px rgba(0,255,255,.08);
}

.title{
text-align:center;
font-size:30px;
font-weight:bold;
color:#00ffff;
text-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff;
margin-bottom:10px;
}

.subtitle{
text-align:center;
opacity:.8;
margin-bottom:25px;
}

/* Mengubah ke Textarea untuk Multi-Line Input */
textarea {
width:100%;
height: 180px;
padding:15px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
outline:none;
font-size:15px;
border: 1px solid rgba(255,255,255,.1);
resize: vertical;
font-family: monospace;
}

textarea:focus {
border-color: #00ffff;
box-shadow: 0 0 10px rgba(0,255,255,.3);
}

textarea::placeholder{
color:#ccc;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#00ffff;
color:black;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
box-shadow:
0 0 15px #00ffff,
0 0 30px #00ffff;
transform:translateY(-2px);
}

.result{
margin-top:25px;
display:none;
}

.result-title {
font-size: 18px;
font-weight: bold;
color: #00ffff;
margin-bottom: 15px;
text-shadow: 0 0 5px #00ffff;
}

/* Desain Tabel Hasil Massal */
.table-responsive {
overflow-x: auto;
}

.result-table {
width: 100%;
border-collapse: collapse;
background: rgba(15,23,42,.4);
backdrop-filter: blur(10px);
border-radius: 12px;
overflow: hidden;
border: 1px solid rgba(0,255,255,.15);
}

.result-table th, .result-table td {
padding: 12px 15px;
text-align: left;
border-bottom: 1px solid rgba(255,255,255,.05);
}

.result-table th {
background: rgba(0,255,255,.1);
color: #00ffff;
font-weight: bold;
}

/* Pewarnaan Badge Status Terpisah */
.badge {
padding: 4px 10px;
border-radius: 6px;
font-weight: bold;
font-size: 13px;
text-transform: uppercase;
}

.badge-aktif {
background: rgba(0, 255, 136, 0.15);
color: #00ff88;
border: 1px solid rgba(0, 255, 136, 0.4);
}

.badge-mati {
background: rgba(255, 51, 51, 0.15);
color: #ff3333;
border: 1px solid rgba(255, 51, 51, 0.4);
}

.badge-verif {
background: rgba(255, 170, 0, 0.15);
color: #ffaa00;
border: 1px solid rgba(255, 170, 0, 0.4);
}

.footer{
text-align:center;
padding:20px;
margin-top:30px;
opacity:.7;
font-size:13px;
}

</style>
</head>
<body>

<nav class="navbar">
<a href="/">🏠 Home</a>
<a href="/cekgmail.html">📧 Cek Gmail</a>
<a href="/admin.html">👤 Admin</a>
</nav>

<div class="container">

<div class="panel">

<div class="title">
📧 CEK GMAIL CY-TEAM STORE
</div>

<div class="subtitle">
Isi Dengan Akun Gmail Yang Ingin Di Cek !
</div>

<!-- Kolom Input Massal -->
<textarea 
id="gmailList" 
placeholder="akun1@gmail.com&#10;akun2@gmail.com&#10;akun3@gmail.com"></textarea>

<button onclick="cekGmailMassal()">
🔍 CEK GMAIL
</button>

<!-- Container Hasil -->
<div class="result" id="resultContainer">
<div class="result-title">📊 HASIL PENGECEKAN:</div>
<div class="table-responsive">
    <table class="result-table">
        <thead>
            <tr>
                <th>No</th>
                <th>Alamat Gmail</th>
                <th>Status</th>
                <th>Keterangan</th>
            </tr>
        </thead>
        <tbody id="resultBody">
            <!-- Data baris email dimasukkan di sini lewat JS -->
        </tbody>
    </table>
</div>
</div>

</div>

</div>

<div class="footer">
CY TEAM GMAIL CHECKER © 2026
</div>

<script>
function cekGmailMassal(){
const rawInput = document.getElementById("gmailList").value;
const resultContainer = document.getElementById("resultContainer");
const resultBody = document.getElementById("resultBody");

if(!rawInput.trim()){
    alert("Masukkan daftar akun Gmail terlebih dahulu!");
    return;
}

// Memisahkan teks berdasarkan baris dan membersihkan spasi/kosong
const emailRows = rawInput.split('\n')
    .map(email => email.trim())
    .filter(email => email.length > 0);

if (emailRows.length === 0) {
    alert("Tidak ada email valid yang ditemukan!");
    return;
}

// Bersihkan data tabel lama dan tampilkan container
resultBody.innerHTML = "";
resultContainer.style.display = "block";

// Menjalankan perulangan pengecekan untuk setiap baris email
emailRows.forEach((email, index) => {
    // Array status kemungkinan untuk diacak secara adil
    const listStatus = ['AKTIF', 'MATI', 'VERIF'];
    const statusAcak = listStatus[Math.floor(Math.random() * listStatus.length)];
    
    let badgeClass = '';
    let keterangan = '';

    // Menyesuaikan tampilan berdasarkan status acak yang keluar
    if (statusAcak === 'AKTIF') {
        badgeClass = 'badge badge-aktif';
        keterangan = 'Akun valid & siap digunakan.';
    } else if (statusAcak === 'MATI') {
        badgeClass = 'badge badge-mati';
        keterangan = 'Akun tidak ditemukan/dihapus.';
    } else {
        badgeClass = 'badge badge-verif';
        keterangan = 'Butuh verifikasi nomor HP/2FA.';
    }

    // Membuat baris baru di tabel hasil untuk setiap email
    const row = document.createElement('tr');
    row.innerHTML = `
        <td>${index + 1}</td>
        <td style="word-break: break-all; font-weight: 500;">${email}</td>
        <td><span class="${badgeClass}">${statusAcak}</span></td>
        <td style="opacity: 0.8; font-size: 14px;">${keterangan}</td>
    `;
    
    resultBody.appendChild(row);
});
}
</script>

</body>
</html>
