<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Store Gmail Cy-Team</title>
    <style>
        /* Gaya Global & Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            color: #ffffff;
            min-height: 100vh;
            background-color: #0a0f23;
        }

        /* Struktur Layout Utama (Sidebar + Konten) */
        .main-wrapper {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        /* ================= KANVAS SIDEBAR BARU ================= */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .sidebar-brand h3 {
            color: #00ffff;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 40px;
            letter-spacing: 1px;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 15px;
        }

        .sidebar-menu li a {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #cccccc;
            text-decoration: none;
            font-size: 15px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .sidebar-menu li a .icon {
            margin-right: 12px;
            font-size: 18px;
        }

        .sidebar-menu li a:hover, 
        .sidebar-menu li a.active {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.15), rgba(0, 136, 204, 0.15));
            color: #00ffff;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.05);
        }

        /* ================= AREA KONTEN UTAMA ================= */
        .content-body {
            flex: 1;
            margin-left: 260px; /* Jarak agar tidak tertutup sidebar */
            padding: 30px 5%;
            display: flex;
            flex-direction: column;
        }

        /* Navigasi Atas */
        header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        header .logo {
            font-size: 20px;
            font-weight: bold;
            color: #00ffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-email {
            font-size: 14px;
            color: #00ffff;
            font-weight: 500;
            background: rgba(0, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        /* Kartu Ringkasan Saldo / Setoran */
        .balance-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .balance-info h3 {
            font-size: 13px;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
        }

        .btn-deposit {
            background: linear-gradient(135deg, #00ffff, #0088cc);
            color: #0a0f23;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
            transition: 0.2s;
        }

        .btn-deposit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 255, 0.5);
        }

        /* Grid Menu Fitur Utama */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 255, 255, 0.2);
            border-color: #00ffff;
        }

        .icon-wrapper {
            width: 48px;
            height: 48px;
            background: rgba(0, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 16px;
            color: #00ffff;
            font-size: 24px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .feature-card h4 {
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .feature-card p {
            font-size: 14px;
            color: #cccccc;
            line-height: 1.5;
        }

        /* Gaya untuk Tabel Riwayat Transaksi */
        .history-section {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-top: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-section h3 {
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: rgba(255, 255, 255, 0.06);
            color: #00ffff;
            padding: 12px 16px;
            font-weight: 600;
            border-bottom: 2px solid rgba(255, 255, 255, 0.15);
        }

        td {
            padding: 12px 16px;
            color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .no-data {
            text-align: center;
            color: #cccccc;
            padding: 30px 0;
            font-style: italic;
        }

        /* Modals UI */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 35, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-box {
            background: #0d1430;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 255, 255, 0.2);
        }

        .modal-box h3 { margin-bottom: 15px; color: #00ffff; }
        
        .modal-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .modal-box input:focus { border-color: #00ffff; }

        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-cancel { background: rgba(255, 255, 255, 0.1); color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; }
        .btn-confirm { background: linear-gradient(135deg, #00ffff, #0088cc); color: #0a0f23; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Responsif Media Query untuk Layar Kecil (Smartphone) */
        @media (max-width: 768px) {
            .main-wrapper {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
