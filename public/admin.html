<!-- JavaScript Bagian 2 dimulai dari bawah sini -->

<script>
let allData = [

{
gmail:"member1@gmail.com",
password:"12345678",
waktu:"15 Juli 2026 20:00"
},

{
gmail:"member2@gmail.com",
password:"12345678",
waktu:"15 Juli 2026 20:05"
},

{
gmail:"member3@gmail.com",
password:"12345678",
waktu:"15 Juli 2026 20:10"
}

];

// Menampilkan Data
function renderData(data){

let html="";

document.getElementById("total").innerHTML=data.length;

data.forEach(item=>{

html+=`

<div class="glass" style="margin-top:15px;">

<h3 style="color:#00ffff;">
📧 ${item.gmail}
</h3>

<p style="margin-top:10px;">
🔑 ${item.password}
</p>

<p style="opacity:.7;margin-top:8px;">
🕒 ${item.waktu}
</p>

</div>

`;

});

document.getElementById("hasil").innerHTML=html;

}

renderData(allData);

// Cari Gmail
function filterData(){

let keyword=document.getElementById("search").value.toLowerCase();

let hasil=allData.filter(x=>

x.gmail.toLowerCase().includes(keyword)

);

renderData(hasil);

}

</script>
