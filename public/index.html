<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STORE GMAIL CY TEAM</title>
  <style>
    /* Pengaturan Reset Dasar */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Pengaturan Background Utama Halaman */
    body {
      background-image: linear-gradient(rgba(10, 15, 35, 0.6), rgba(10, 15, 35, 0.7)), url('background.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Kotak Panel Transparan (Glassmorphism) */
    .loading-container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 40px 30px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    /* Pengaturan Header Teks */
    .loading-header h2 {
      font-size: 24px;
      font-weight: 800;
      color: #00ffff; /* Warna cyan futuristik */
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .loading-header p {
      font-size: 14px;
      color: #cccccc;
    }

    /* Efek Animasi Loading Spinner Tradisional */
    .spinner {
      margin: 25px auto 0 auto;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid #00ffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Tombol WA Melayang */
    .wa-floating-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: rgba(10, 15, 35, 0.8);
      color: #00ffff;
      border: 1px solid #00ffff;
      padding: 12px 20px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
      backdrop-filter: blur(10px);
      z-index: 9999;
      transition: all 0.3s ease;
    }

    .wa-floating-btn:hover {
      transform: translateY(-5px);
      background: #00ffff;
      color: #0a0f23;
      box-shadow: 0 0 25px #00ffff;
    }

    .wa-floating-btn:hover svg {
      fill: #0a0f23 !important;
    }
  </style>
</head>
<body>

  <div class="loading-container">
    <div class="loading-header">
      <h2>STORE GMAIL CY TEAM</h2>
      <p>Membuka halaman utama toko...</p>
    </div>
    
    <!-- Animasi loading sebelum dialihkan -->
    <div class="spinner"></div>
  </div>

  <!-- Tombol WhatsApp Terintegrasi Nomor Anda -->
  <a href="https://wa.me/6285133431132" class="wa-floating-btn" target="_blank" rel="noopener noreferrer">
    <svg viewBox="0 0 32 32" style="width:24px; height:24px; fill:#00ffff;">
      <path d="M16 2a14 14 0 0 0-12.1 21L2 29l6.3-1.6A14 14 0 1 0 16 2zm7.5 20c-.3.9-1.7 1.7-2.4 1.8-.7.1-1.5.2-4.5-.9-3.7-1.5-6-5.3-6.2-5.5-.2-.2-1.7-2.3-1.7-4.4 0-2.1 1.1-3.1 1.5-3.5.3-.3.8-.5 1.2-.5.1 0 .3 0 .4.1.4 0 .6.1.8.6.3.6.9 2.2 1 2.4.1.2.1.4 0 .6-.1.2-.2.4-.4.6l-.6.7c-.2.2-.4.4-.2.8.3.5 1.3 2.1 2.8 3.5 1.9 1.7 3.5 2.2 4 2.4.5.2.8.2 1.1-.2.3-.4 1.3-1.5 1.6-2 .3-.5.7-.4 1.2-.2.5.2 3.1 1.5 3.6 1.8.5.2.9.4 1 .6.2.3.2 1.7-.2 2.6z"/>
    </svg>
    <span>Chat Admin</span>
  </a>

  <script>
    // Menunggu 1 detik (1000ms) untuk estetika loading, lalu masuk ke home.html
    setTimeout(() => {
      window.location.href = "";
    }, 1000);
  </script>
  
</body>
  </html>
