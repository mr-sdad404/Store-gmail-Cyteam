<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CY TEAM MEMBER DASHBOARD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{
background:linear-gradient(rgba(5,10,30,.75),rgba(5,10,30,.75)),url('background.jpg');
background-size:cover;background-position:center;background-attachment:fixed;
color:#fff;min-height:100vh
}
.menu-btn{
position:fixed;top:20px;left:20px;width:55px;height:55px;border:none;
border-radius:16px;cursor:pointer;font-size:24px;font-weight:bold;
background:linear-gradient(135deg,#00ffff,#6a00ff);color:#fff;z-index:1001
}
.sidebar{
position:fixed;top:0;left:-320px;width:300px;height:100%;
padding:20px;transition:.35s;overflow-y:auto;z-index:1002;
background:rgba(10,15,35,.96);backdrop-filter:blur(20px)
}
.sidebar.active{left:0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:1000}
.overlay.active{display:block}
.profile{text-align:center;margin-bottom:20px}
.profile img{width:90px;height:90px;border-radius:50%;border:3px solid #00ffff}
.profile h2{margin-top:10px;color:#00ffff}
.balance{
padding:18px;border-radius:20px;margin-bottom:20px;
background:linear-gradient(135deg,#00ffff,#6a00ff,#00a2ff);
background-size:300% 300%;animation:holo 6s infinite
}
@keyframes holo{
0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}
}
.sidebar a{
display:block;text-decoration:none;color:#fff;padding:14px;
margin-top:10px;border-radius:14px;background:rgba(255,255,255,.06)
}
.container{max-width:1100px;margin:auto;padding:90px 20px 30px}
.hero,.glass{text-align:center}
.hero h1{color:#00ffff}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-top:20px}
.glass{
background:rgba(255,255,255,.08);backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:20px
}
.big{font-size:30px;color:#00ffff;font-weight:bold}
.clock{margin-top:20px}
.footer{text-align:center;padding:25px;opacity:.7}
.wa-floating-btn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: rgba(10, 15, 35, 0.8);
  color: #00ffff;
  border: 1px solid #00ffff;
  padding: 12px 20px;
  border-radius: 50px;
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  font-family: 'Segoe UI', sans-serif;
  font-size: 14px;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
  backdrop-filter: blur(10px);
  z-index: 9999;
  transition: all 0.3s ease;
}

.wa-floating-btn:hover {
  transform: translateY(-5px);
  background: #00ffff;
  color: #0a0f23;
  box-shadow: 0 0 25px #00ffff;
}

.wa-floating-btn:hover svg {
  fill: #0a0f23 !important;
}

</style>
</head>
<body>
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div id="sidebar" class="sidebar">
<div class="profile">
<img src="profile.jpg" alt="Profile">
<h2>CY TEAM</h2>
<p>Member Dashboard</p>
</div>

<div class="balance">
<div>Saldo Tersedia</div>
<h2>Rp 0</h2>
</div>

<a href="#">🏠 Home</a>
<a href="#">👤 Profil</a>
<a href="#">💰 Saldo</a>
<a href="#">📊 Dashboard</a>
<a href="#">📜 Riwayat</a>
<a href="#">⚙️ Pengaturan</a>
<a href="#">🚪 Logout</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">
<div class="hero">
<h1>🚀 CY TEAM MEMBER DASHBOARD</h1>
<p>Tema Hologram Futuristik</p>
</div>

<div class="grid">
<div class="glass"><div>Total Transaksi</div><div class="big">120</div></div>
<div class="glass"><div>Reward</div><div class="big">25</div></div>
<div class="glass"><div>Saldo</div><div class="big">Rp50K</div></div>
<div class="glass"><div>Status</div><div class="big">VIP</div></div>
</div>

<div class="glass clock">
<h2>🕒 Waktu Saat Ini</h2>
<div id="clock" class="big"></div>
</div>
</div>

<div class="footer">CY TEAM SYSTEM © 2026</div>

<script>
function toggleMenu(){
document.getElementById('sidebar').classList.toggle('active');
document.getElementById('overlay').classList.toggle('active');
}
function updateClock(){
document.getElementById('clock').innerText=new Date().toLocaleString('id-ID');
}
setInterval(updateClock,1000);updateClock();
</script>

  <span>Chat Admin</span>

</body>
</html>
